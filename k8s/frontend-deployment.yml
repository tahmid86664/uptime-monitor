apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: uptime-monitor
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ${ACCOUNT_ID}.dkr.ecr.ap-southeast-1.amazonaws.com/uptime-monitor-frontend:${IMAGE_TAG}
          ports:
            - containerPort: 3001
          env:
            - name: BACKEND_URL
              value: 'http://backend-service:8080'
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: API_KEY
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
