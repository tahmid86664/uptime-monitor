services:
  frontend:
    build:
      context: ./uptime-monitor-frontend
      dockerfile: Dockerfile
    image: uptime-monitor-frontend:latest
    container_name: uptime-monitor-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./uptime-monitor-frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - uptime-monitor-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  backend:
    build:
      context: ./uptime-monitor-backend
      dockerfile: Dockerfile
    image: uptime-monitor-backend:latest
    container_name: uptime-monitor-backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    env_file:
      - ./uptime-monitor-backend/.env
    networks:
      - uptime-monitor-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8080/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  uptime-monitor-net:
    driver: bridge
